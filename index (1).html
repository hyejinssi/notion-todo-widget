<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Do Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f7f7f5;
      --bg-hover: #f0efeb;
      --text-primary: #1a1a1a;
      --text-secondary: #555550;
      --text-tertiary: #999990;
      --border: rgba(0,0,0,0.10);
      --border-hover: rgba(0,0,0,0.18);
      --border-strong: rgba(0,0,0,0.25);
      --star-fill: #EF9F27;
      --star-stroke: #BA7517;
      --radius-md: 8px;
      --radius-lg: 12px;
      --accent: #EF9F27;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg-secondary: #2a2a27;
        --bg-hover: #333330;
        --text-primary: #f0efeb;
        --text-secondary: #b0afa8;
        --text-tertiary: #6e6e68;
        --border: rgba(255,255,255,0.10);
        --border-hover: rgba(255,255,255,0.18);
        --border-strong: rgba(255,255,255,0.25);
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1.5rem 3rem;
    }

    /* 로그인 화면 */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 1rem;
      text-align: center;
    }

    .login-title {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .login-sub {
      font-size: 13px;
      color: var(--text-tertiary);
      margin-bottom: 1rem;
    }

    .google-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: var(--bg);
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-lg);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }

    .google-btn:hover {
      background: var(--bg-hover);
      border-color: var(--border-strong);
    }

    .google-logo {
      width: 18px;
      height: 18px;
    }

    /* 로딩 */
    .loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: var(--text-tertiary);
      font-size: 13px;
      gap: 8px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 메인 앱 */
    .todo-wrap { max-width: 620px; margin: 0 auto; }

    .todo-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .todo-title {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .todo-count {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .logout-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-tertiary);
      padding: 2px 6px;
      border-radius: var(--radius-md);
      transition: color 0.12s, background 0.12s;
    }

    .logout-btn:hover {
      color: var(--text-secondary);
      background: var(--bg-hover);
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .progress-bar-bg {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.35s ease;
    }

    .progress-label {
      font-size: 12px;
      color: var(--text-tertiary);
      min-width: 34px;
      text-align: right;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .todo-item {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color 0.15s, opacity 0.2s;
    }

    .todo-item:hover { border-color: var(--border-hover); }
    .todo-item.done { opacity: 0.50; }

    .todo-row {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      gap: 10px;
    }

    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .star-svg {
      width: 20px;
      height: 20px;
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
    }

    .star-btn:hover .star-svg { transform: scale(1.28); }

    .star-path {
      fill: none;
      stroke: var(--text-tertiary);
      stroke-width: 1.6;
      stroke-linejoin: round;
      transition: fill 0.18s, stroke 0.18s;
    }

    .star-path.filled {
      fill: var(--star-fill);
      stroke: var(--star-stroke);
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 400;
      line-height: 1.45;
      word-break: break-word;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--text-tertiary);
    }

    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: var(--text-tertiary);
      border-radius: var(--radius-md);
      transition: color 0.12s, background 0.12s;
      flex-shrink: 0;
    }

    .toggle-btn:hover {
      color: var(--text-secondary);
      background: var(--bg-hover);
    }

    .toggle-icon {
      font-size: 16px;
      transition: transform 0.22s ease;
      display: inline-block;
    }

    .toggle-icon.open { transform: rotate(180deg); }

    .detail-area {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.28s ease;
    }

    .detail-area.open { max-height: 500px; }

    .detail-inner {
      border-top: 0.5px solid var(--border);
      padding: 10px 14px 14px 48px;
    }

    .detail-textarea {
      width: 100%;
      min-height: 76px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 8px 10px;
      resize: vertical;
      line-height: 1.65;
      outline: none;
      transition: border-color 0.15s;
    }

    .detail-textarea:focus { border-color: var(--border-strong); }
    .detail-textarea::placeholder { color: var(--text-tertiary); font-style: italic; }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: var(--text-tertiary);
      border-radius: var(--radius-md);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, color 0.12s, background 0.12s;
    }

    .todo-item:hover .icon-btn { opacity: 1; }
    .icon-btn:hover { color: var(--text-secondary); background: var(--bg-hover); }
    .icon-btn.delete-btn:hover { color: #E24B4A; background: #FCEBEB; }
    .icon-btn i { font-size: 15px; }

    .edit-input {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-primary);
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      padding: 3px 8px;
      outline: none;
      line-height: 1.45;
    }

    .add-area {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .add-input {
      flex: 1;
      height: 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-secondary);
      border: 0.5px dashed var(--border-hover);
      border-radius: var(--radius-md);
      padding: 0 12px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .add-input:focus {
      border-style: solid;
      border-color: var(--border-strong);
      background: var(--bg);
    }

    .add-input::placeholder { color: var(--text-tertiary); }

    .add-btn {
      height: 40px;
      padding: 0 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      background: var(--bg);
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }

    .add-btn:hover { background: var(--bg-hover); border-color: var(--border-strong); }
    .add-btn:active { transform: scale(0.97); }

    .empty-state {
      text-align: center;
      padding: 2rem 0 1.5rem;
      color: var(--text-tertiary);
      font-size: 13px;
    }

    .empty-state i {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    .sync-status {
      font-size: 11px;
      color: var(--text-tertiary);
      text-align: right;
      margin-top: 8px;
      min-height: 16px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- 로딩 -->
  <div id="loading-screen" class="loading-screen">
    <div class="spinner"></div>
    <span>불러오는 중...</span>
  </div>

  <!-- 로그인 -->
  <div id="login-screen" class="login-screen hidden">
    <p class="login-title">할 일</p>
    <p class="login-sub">구글 계정으로 로그인하면<br>모든 기기에서 동기화돼요</p>
    <button class="google-btn" onclick="loginWithGoogle()">
      <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google로 로그인
    </button>
  </div>

  <!-- 메인 앱 -->
  <div id="app-screen" class="todo-wrap hidden">
    <div class="todo-header">
      <h1 class="todo-title">할 일</h1>
      <div class="header-right">
        <span class="todo-count" id="count-label"></span>
        <button class="logout-btn" onclick="logout()">로그아웃</button>
      </div>
    </div>

    <div class="progress-row">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progress-label">0%</span>
    </div>

    <div class="todo-list" id="todo-list"></div>

    <div class="add-area">
      <input class="add-input" id="add-input" type="text" placeholder="+ 새 할 일 추가..." maxlength="100" />
      <button class="add-btn" onclick="addTodo()">
        <i class="ti ti-plus" aria-hidden="true"></i>추가
      </button>
    </div>

    <div class="sync-status" id="sync-status"></div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBR4DWh3eKsEkPuo5KLAByWarlgIPIdjA4",
      authDomain: "notion-todo-widget.firebaseapp.com",
      projectId: "notion-todo-widget",
      storageBucket: "notion-todo-widget.firebasestorage.app",
      messagingSenderId: "817627004338",
      appId: "1:817627004338:web:3a1f0b246804ea800438ab"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let todos = [];
    let editingId = null;
    let unsubscribe = null;

    const STAR_PATH = "M12 2.5l2.6 5.3 5.8.8-4.2 4.1 1 5.8L12 15.8l-5.2 2.7 1-5.8L3.6 8.6l5.8-.8z";

    function show(id) {
      ['loading-screen','login-screen','app-screen'].forEach(s => {
        document.getElementById(s).classList.add('hidden');
      });
      document.getElementById(id).classList.remove('hidden');
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function starSVG(filled) {
      return `<svg class="star-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path class="star-path${filled ? ' filled' : ''}" d="${STAR_PATH}"/>
      </svg>`;
    }

    function syncStatus(msg) {
      document.getElementById('sync-status').textContent = msg;
    }

    function render() {
      const list = document.getElementById('todo-list');
      const done = todos.filter(t => t.done).length;
      const total = todos.length;
      const pct = total ? Math.round(done / total * 100) : 0;

      document.getElementById('count-label').textContent = `${done} / ${total} 완료`;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent = pct + '%';

      if (todos.length === 0) {
        list.innerHTML = `<div class="empty-state"><i class="ti ti-star" aria-hidden="true"></i>할 일을 추가해 보세요!</div>`;
        return;
      }

      list.innerHTML = todos.map(t => {
        const isEditing = editingId === t.id;
        const textPart = isEditing
          ? `<input class="edit-input" id="edit-${t.id}" value="${escHtml(t.text)}"
               onblur="saveEdit('${t.id}')" onkeydown="editKeydown(event,'${t.id}')" maxlength="100" />`
          : `<span class="todo-text" ondblclick="startEdit('${t.id}')">${escHtml(t.text)}</span>`;

        return `
        <div class="todo-item${t.done ? ' done' : ''}" id="item-${t.id}">
          <div class="todo-row">
            <button class="star-btn" onclick="toggleDone('${t.id}')" aria-label="${t.done ? '완료 취소' : '완료 표시'}">
              ${starSVG(t.done)}
            </button>
            ${textPart}
            <button class="icon-btn" onclick="startEdit('${t.id}')" aria-label="수정">
              <i class="ti ti-pencil"></i>
            </button>
            <button class="icon-btn delete-btn" onclick="deleteTodo('${t.id}')" aria-label="삭제">
              <i class="ti ti-x"></i>
            </button>
            <button class="toggle-btn" onclick="toggleDetail('${t.id}')" aria-label="상세 내용 ${t.open ? '닫기' : '열기'}">
              <i class="ti ti-chevron-down toggle-icon${t.open ? ' open' : ''}"></i>
            </button>
          </div>
          <div class="detail-area${t.open ? ' open' : ''}">
            <div class="detail-inner">
              <textarea class="detail-textarea" placeholder="상세 내용을 입력하세요..."
                oninput="updateDetail('${t.id}', this.value)"
              >${escHtml(t.detail || '')}</textarea>
            </div>
          </div>
        </div>`;
      }).join('');

      if (editingId !== null) {
        const el = document.getElementById(`edit-${editingId}`);
        if (el) { el.focus(); el.select(); }
      }
    }

    function todosRef(uid) {
      return collection(db, 'users', uid, 'todos');
    }

    function startListening(uid) {
      if (unsubscribe) unsubscribe();
      unsubscribe = onSnapshot(todosRef(uid), snap => {
        // open 상태는 로컬에서만 유지 — Firebase 업데이트 때 닫히지 않게
        const openMap = {};
        todos.forEach(t => { openMap[t.id] = t.open; });
        todos = snap.docs.map(d => ({ id: d.id, ...d.data(), open: openMap[d.id] || false }));
        todos.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
        render();
        syncStatus('✓ 동기화됨');
        setTimeout(() => syncStatus(''), 2000);
      });
    }

    // 전역 함수로 노출
    window.loginWithGoogle = async () => {
      const provider = new GoogleAuthProvider();
      try { await signInWithPopup(auth, provider); }
      catch(e) { console.error(e); }
    };

    window.logout = async () => {
      if (unsubscribe) unsubscribe();
      await signOut(auth);
    };

    window.addTodo = async () => {
      const input = document.getElementById('add-input');
      const text = input.value.trim();
      if (!text || !auth.currentUser) return;
      input.value = '';
      syncStatus('저장 중...');
      await addDoc(todosRef(auth.currentUser.uid), {
        text, done: false, detail: '', createdAt: serverTimestamp()
      });
    };

    window.toggleDone = async (id) => {
      const t = todos.find(t => t.id === id);
      if (!t || !auth.currentUser) return;
      await updateDoc(doc(db, 'users', auth.currentUser.uid, 'todos', id), { done: !t.done });
    };

    window.toggleDetail = (id) => {
      const t = todos.find(t => t.id === id);
      if (t) { t.open = !t.open; render(); }
    };

    let detailTimer = null;
    window.updateDetail = async (id, val) => {
      // 로컬 상태 즉시 반영
      const t = todos.find(t => t.id === id);
      if (t) t.detail = val;
      // Firebase는 0.8초 후 한 번만 저장 (타이핑할 때마다 onSnapshot 발동 방지)
      clearTimeout(detailTimer);
      detailTimer = setTimeout(async () => {
        if (!auth.currentUser) return;
        await updateDoc(doc(db, 'users', auth.currentUser.uid, 'todos', id), { detail: val });
      }, 800);
    };

    window.deleteTodo = async (id) => {
      if (!auth.currentUser) return;
      await deleteDoc(doc(db, 'users', auth.currentUser.uid, 'todos', id));
    };

    window.startEdit = (id) => { editingId = id; render(); };

    window.saveEdit = async (id) => {
      const el = document.getElementById(`edit-${id}`);
      if (!el || !auth.currentUser) return;
      const val = el.value.trim();
      if (val) await updateDoc(doc(db, 'users', auth.currentUser.uid, 'todos', id), { text: val });
      editingId = null;
      render();
    };

    window.editKeydown = (e, id) => {
      if (e.key === 'Enter') { e.preventDefault(); window.saveEdit(id); }
      if (e.key === 'Escape') { editingId = null; render(); }
    };

    document.getElementById('add-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.addTodo();
    });

    // 인증 상태 감지
    onAuthStateChanged(auth, user => {
      if (user) {
        show('app-screen');
        startListening(user.uid);
      } else {
        show('login-screen');
        todos = [];
      }
    });
  </script>
</body>
</html>
