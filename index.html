<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Do Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f7f7f5;
      --bg-hover: #f0efeb;
      --text-primary: #1a1a1a;
      --text-secondary: #555550;
      --text-tertiary: #999990;
      --border: rgba(0,0,0,0.10);
      --border-hover: rgba(0,0,0,0.18);
      --border-strong: rgba(0,0,0,0.25);
      --star-fill: #EF9F27;
      --star-stroke: #BA7517;
      --radius-md: 8px;
      --radius-lg: 12px;
      --accent: #EF9F27;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg-secondary: #2a2a27;
        --bg-hover: #333330;
        --text-primary: #f0efeb;
        --text-secondary: #b0afa8;
        --text-tertiary: #6e6e68;
        --border: rgba(255,255,255,0.10);
        --border-hover: rgba(255,255,255,0.18);
        --border-strong: rgba(255,255,255,0.25);
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1.5rem 3rem;
    }

    .todo-wrap {
      max-width: 620px;
      margin: 0 auto;
    }

    .todo-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .todo-title {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .todo-count {
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    /* 진행률 바 */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .progress-bar-bg {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.35s ease;
    }

    .progress-label {
      font-size: 12px;
      color: var(--text-tertiary);
      min-width: 34px;
      text-align: right;
    }

    /* 할 일 리스트 */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .todo-item {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color 0.15s, opacity 0.2s;
    }

    .todo-item:hover {
      border-color: var(--border-hover);
    }

    .todo-item.done {
      opacity: 0.50;
    }

    .todo-row {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      gap: 10px;
    }

    /* 별 버튼 */
    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .star-svg {
      width: 20px;
      height: 20px;
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
    }

    .star-btn:hover .star-svg {
      transform: scale(1.28);
    }

    .star-path {
      fill: none;
      stroke: var(--text-tertiary);
      stroke-width: 1.6;
      stroke-linejoin: round;
      transition: fill 0.18s, stroke 0.18s;
    }

    .star-path.filled {
      fill: var(--star-fill);
      stroke: var(--star-stroke);
    }

    /* 할 일 텍스트 */
    .todo-text {
      flex: 1;
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 400;
      line-height: 1.45;
      word-break: break-word;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--text-tertiary);
    }

    /* 토글 버튼 */
    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: var(--text-tertiary);
      border-radius: var(--radius-md);
      transition: color 0.12s, background 0.12s;
      flex-shrink: 0;
    }

    .toggle-btn:hover {
      color: var(--text-secondary);
      background: var(--bg-hover);
    }

    .toggle-icon {
      font-size: 16px;
      transition: transform 0.22s ease;
      display: inline-block;
    }

    .toggle-icon.open {
      transform: rotate(180deg);
    }

    /* 상세 영역 */
    .detail-area {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.28s ease;
    }

    .detail-area.open {
      max-height: 500px;
    }

    .detail-inner {
      border-top: 0.5px solid var(--border);
      padding: 10px 14px 14px 48px;
    }

    .detail-textarea {
      width: 100%;
      min-height: 76px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 8px 10px;
      resize: vertical;
      line-height: 1.65;
      outline: none;
      transition: border-color 0.15s;
    }

    .detail-textarea:focus {
      border-color: var(--border-strong);
    }

    .detail-textarea::placeholder {
      color: var(--text-tertiary);
      font-style: italic;
    }

    /* 삭제 버튼 */
    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: var(--text-tertiary);
      border-radius: var(--radius-md);
      transition: color 0.12s, background 0.12s;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, color 0.12s, background 0.12s;
    }

    .todo-item:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      color: #E24B4A;
      background: #FCEBEB;
    }

    .delete-btn i {
      font-size: 15px;
    }

    /* 추가 영역 */
    .add-area {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .add-input {
      flex: 1;
      height: 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-secondary);
      border: 0.5px dashed var(--border-hover);
      border-radius: var(--radius-md);
      padding: 0 12px;
      outline: none;
      transition: border-color 0.15s, background 0.15s, border-style 0.15s;
    }

    .add-input:focus {
      border-style: solid;
      border-color: var(--border-strong);
      background: var(--bg);
    }

    .add-input::placeholder {
      color: var(--text-tertiary);
    }

    .add-btn {
      height: 40px;
      padding: 0 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      background: var(--bg);
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: var(--bg-hover);
      border-color: var(--border-strong);
    }

    .add-btn:active {
      transform: scale(0.97);
    }

    .empty-state {
      text-align: center;
      padding: 2rem 0 1.5rem;
      color: var(--text-tertiary);
      font-size: 13px;
    }

    .empty-state i {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="todo-wrap">
    <div class="todo-header">
      <h1 class="todo-title">할 일</h1>
      <span class="todo-count" id="count-label"></span>
    </div>

    <div class="progress-row">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progress-label">0%</span>
    </div>

    <div class="todo-list" id="todo-list"></div>

    <div class="add-area">
      <input
        class="add-input"
        id="add-input"
        type="text"
        placeholder="+ 새 할 일 추가..."
        maxlength="100"
      />
      <button class="add-btn" onclick="addTodo()">
        <i class="ti ti-plus" aria-hidden="true"></i>추가
      </button>
    </div>
  </div>

  <script>
    const STAR_PATH = "M12 2.5l2.6 5.3 5.8.8-4.2 4.1 1 5.8L12 15.8l-5.2 2.7 1-5.8L3.6 8.6l5.8-.8z";

    // localStorage로 데이터 유지
    function loadTodos() {
      try {
        const saved = localStorage.getItem('notion-todos');
        return saved ? JSON.parse(saved) : [
          { id: 1, text: "할 일 예시 — 별을 눌러 완료 표시!", done: false, detail: "별을 누르면 완료, 화살표를 누르면 상세 메모를 입력할 수 있어요.", open: true },
          { id: 2, text: "새 할 일은 아래 입력창에서 추가", done: false, detail: "", open: false },
        ];
      } catch(e) {
        return [];
      }
    }

    function saveTodos() {
      try { localStorage.setItem('notion-todos', JSON.stringify(todos)); } catch(e) {}
    }

    let todos = loadTodos();
    let nextId = todos.length ? Math.max(...todos.map(t => t.id)) + 1 : 1;

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    function starSVG(filled) {
      return `<svg class="star-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path class="star-path${filled ? ' filled' : ''}" d="${STAR_PATH}"/>
      </svg>`;
    }

    function render() {
      const list = document.getElementById('todo-list');
      const done = todos.filter(t => t.done).length;
      const total = todos.length;
      const pct = total ? Math.round(done / total * 100) : 0;

      document.getElementById('count-label').textContent = `${done} / ${total} 완료`;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent = pct + '%';

      if (todos.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <i class="ti ti-star" aria-hidden="true"></i>
            할 일을 추가해 보세요!
          </div>`;
        return;
      }

      list.innerHTML = todos.map(t => `
        <div class="todo-item${t.done ? ' done' : ''}" id="item-${t.id}">
          <div class="todo-row">
            <button class="star-btn" onclick="toggleDone(${t.id})" aria-label="${t.done ? '완료 취소' : '완료 표시'}">
              ${starSVG(t.done)}
            </button>
            <span class="todo-text">${escHtml(t.text)}</span>
            <button class="delete-btn" onclick="deleteTodo(${t.id})" aria-label="삭제">
              <i class="ti ti-x"></i>
            </button>
            <button class="toggle-btn" onclick="toggleDetail(${t.id})" aria-label="상세 내용 ${t.open ? '닫기' : '열기'}">
              <i class="ti ti-chevron-down toggle-icon${t.open ? ' open' : ''}"></i>
            </button>
          </div>
          <div class="detail-area${t.open ? ' open' : ''}">
            <div class="detail-inner">
              <textarea
                class="detail-textarea"
                placeholder="상세 내용을 입력하세요..."
                oninput="updateDetail(${t.id}, this.value)"
              >${escHtml(t.detail)}</textarea>
            </div>
          </div>
        </div>
      `).join('');
    }

    function toggleDone(id) {
      const t = todos.find(t => t.id === id);
      if (t) { t.done = !t.done; saveTodos(); render(); }
    }

    function toggleDetail(id) {
      const t = todos.find(t => t.id === id);
      if (t) { t.open = !t.open; render(); }
    }

    function updateDetail(id, val) {
      const t = todos.find(t => t.id === id);
      if (t) { t.detail = val; saveTodos(); }
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      saveTodos();
      render();
    }

    function addTodo() {
      const input = document.getElementById('add-input');
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: nextId++, text, done: false, detail: "", open: false });
      input.value = '';
      saveTodos();
      render();
    }

    document.getElementById('add-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
